# .gitea/workflows/apply.yaml
#
# Triggered ONLY on push to main (i.e., after an MR is approved and merged).
# Runs terraform apply for each environment whose files changed in the merge commit.
#
# Prod apply is gated behind a Gitea "environment" that requires manual approval
# from a designated approver group (configured in Gitea UI — see docs/runbook.md).

name: "Terraform Apply"

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

env:
  TF_VERSION:       "1.7.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT:         "false"

jobs:
  # ── Determine which environments changed in this merge ────────────────────
  detect-changes:
    name: "Detect Changed Environments"
    runs-on: ubuntu-latest
    outputs:
      dev:     ${{ steps.changes.outputs.dev }}
      staging: ${{ steps.changes.outputs.staging }}
      prod:    ${{ steps.changes.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed terraform environments
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          MODULE_CHANGED=$(echo "$CHANGED" | grep -c "terraform/modules/" || true)

          for env in dev staging prod; do
            ENV_CHANGED=$(echo "$CHANGED" | grep -c "terraform/environments/$env/" || true)
            if [ "$ENV_CHANGED" -gt 0 ] || [ "$MODULE_CHANGED" -gt 0 ]; then
              echo "$env=true" >> "$GITHUB_OUTPUT"
            else
              echo "$env=false" >> "$GITHUB_OUTPUT"
            fi
          done

  # ── Apply: Dev ────────────────────────────────────────────────────────────
  apply-dev:
    name: "Apply: Dev"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dev == 'true'
    # "dev-deploy" environment has no approval gate — auto-deploys
    environment: dev-deploy
    concurrency:
      group: tf-apply-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/dev
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_DEV }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_DEV }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform apply -auto-approve -no-color

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Dev apply failed — check Terraform output above"
          # Add your alerting hook here (e.g., curl to Slack webhook)

  # ── Apply: Staging ────────────────────────────────────────────────────────
  apply-staging:
    name: "Apply: Staging"
    runs-on: ubuntu-latest
    needs: [detect-changes, apply-dev]
    # Staging waits for dev to succeed (sequential promotion)
    if: |
      always() &&
      needs.detect-changes.outputs.staging == 'true' &&
      (needs.apply-dev.result == 'success' || needs.apply-dev.result == 'skipped')
    environment: staging-deploy  # 1 approval required (configured in Gitea UI)
    concurrency:
      group: tf-apply-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/staging
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/staging
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_STAGING }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_STAGING }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform apply -auto-approve -no-color

  # ── Apply: Prod ───────────────────────────────────────────────────────────
  apply-prod:
    name: "Apply: Prod"
    runs-on: ubuntu-latest
    needs: [detect-changes, apply-staging]
    if: |
      always() &&
      needs.detect-changes.outputs.prod == 'true' &&
      (needs.apply-staging.result == 'success' || needs.apply-staging.result == 'skipped')
    # "prod-deploy" environment MUST have required reviewers set in Gitea UI.
    # The job PAUSES here until a designated approver clicks "Approve" in the UI.
    environment: prod-deploy
    concurrency:
      group: tf-apply-prod
      cancel-in-progress: false  # Never cancel a running prod apply
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/prod
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform init

      - name: Terraform Plan (final confirmation before apply)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_PROD }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_PROD }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: |
          echo "=== Final plan before prod apply ==="
          terraform plan -no-color

      - name: Terraform Apply — Production
        working-directory: terraform/environments/prod
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_PROD }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_PROD }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform apply -auto-approve -no-color

      - name: Prod apply succeeded
        if: success()
        run: |
          echo "✅ Production Observability Pipeline processors updated successfully"
          echo "Commit: ${{ gitea.sha }}"
          echo "Actor: ${{ gitea.actor }}"

      - name: Prod apply failed — alert
        if: failure()
        run: |
          echo "::error::PRODUCTION APPLY FAILED"
          echo "Commit: ${{ gitea.sha }}"
          # Add PagerDuty / Slack / email webhook call here
          # Example:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 PROD Datadog OP Terraform apply FAILED on commit ${{ gitea.sha }}"}'
          exit 1
