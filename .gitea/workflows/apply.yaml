# .gitea/workflows/apply.yaml
#
# Triggered on:
#   - push to `main`      — standard human-reviewed GitOps path
#   - push to `automation` — trusted service bypass path (no approval gates)
#
# Live-sync: Before every apply, the current Datadog API state is fetched and
# written to live_processors.auto.tfvars.json. This guarantees Terraform always
# applies against the real current state of each pipeline, catching any out-of-band
# changes made directly in the Datadog UI or by other tooling.
#
# Prod apply on main is gated behind a Gitea "environment" requiring manual approval.
# Prod apply on automation branch skips that gate entirely.

name: "Terraform Apply"

on:
  push:
    branches:
      - main
      - automation
    paths:
      - "terraform/**"

env:
  TF_VERSION:       "1.7.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT:         "false"
  PYTHON_VERSION:   "3.11"

jobs:
  # ── Determine which environments changed in this merge ────────────────────
  detect-changes:
    name: "Detect Changed Environments"
    runs-on: ubuntu-latest
    outputs:
      dev:            ${{ steps.changes.outputs.dev }}
      staging:        ${{ steps.changes.outputs.staging }}
      prod:           ${{ steps.changes.outputs.prod }}
      is_automation:  ${{ steps.changes.outputs.is_automation }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed terraform environments
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          MODULE_CHANGED=$(echo "$CHANGED" | grep -c "terraform/modules/" || true)

          for env in dev staging prod; do
            ENV_CHANGED=$(echo "$CHANGED" | grep -c "terraform/environments/$env/" || true)
            if [ "$ENV_CHANGED" -gt 0 ] || [ "$MODULE_CHANGED" -gt 0 ]; then
              echo "$env=true" >> "$GITHUB_OUTPUT"
            else
              echo "$env=false" >> "$GITHUB_OUTPUT"
            fi
          done

          # Flag whether this is an automation branch push
          if [ "${{ gitea.ref_name }}" = "automation" ]; then
            echo "is_automation=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_automation=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Apply: Dev ────────────────────────────────────────────────────────────
  apply-dev:
    name: "Apply: Dev"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.dev == 'true'
    environment: dev-deploy
    concurrency:
      group: tf-apply-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Live sync: always apply against current Datadog state ───────────
      - name: Sync live pipeline state from Datadog
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY_DEV }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_DEV }}
        run: |
          python3 scripts/sync_live_state.py \
            --env dev \
            --pipeline-ids ${{ secrets.DD_PIPELINE_IDS_DEV }} \
            --out-dir terraform/environments/dev
          echo "=== Live sync complete (dev) ==="
          cat terraform/environments/dev/drift_report.txt

      - name: Terraform Init
        working-directory: terraform/environments/dev
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_DEV }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_DEV }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform apply -auto-approve -no-color

      - name: Notify on failure
        if: failure()
        run: echo "::error::Dev apply failed — check Terraform output above"

  # ── Apply: Staging ────────────────────────────────────────────────────────
  apply-staging:
    name: "Apply: Staging"
    runs-on: ubuntu-latest
    needs: [detect-changes, apply-dev]
    if: |
      always() &&
      needs.detect-changes.outputs.staging == 'true' &&
      (needs.apply-dev.result == 'success' || needs.apply-dev.result == 'skipped')
    # Automation branch bypasses the approval gate; main branch requires it
    environment: ${{ needs.detect-changes.outputs.is_automation == 'true' && 'staging-deploy-auto' || 'staging-deploy' }}
    concurrency:
      group: tf-apply-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Sync live pipeline state from Datadog
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY_STAGING }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_STAGING }}
        run: |
          python3 scripts/sync_live_state.py \
            --env staging \
            --pipeline-ids ${{ secrets.DD_PIPELINE_IDS_STAGING }} \
            --out-dir terraform/environments/staging
          echo "=== Live sync complete (staging) ==="
          cat terraform/environments/staging/drift_report.txt

      - name: Terraform Init
        working-directory: terraform/environments/staging
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform/environments/staging
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_STAGING }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_STAGING }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform apply -auto-approve -no-color

  # ── Apply: Prod ───────────────────────────────────────────────────────────
  apply-prod:
    name: "Apply: Prod"
    runs-on: ubuntu-latest
    needs: [detect-changes, apply-staging]
    if: |
      always() &&
      needs.detect-changes.outputs.prod == 'true' &&
      (needs.apply-staging.result == 'success' || needs.apply-staging.result == 'skipped')
    # KEY BYPASS LOGIC:
    #   automation branch → prod-deploy-auto (no required reviewers, no wait timer)
    #   main branch       → prod-deploy      (2 required reviewers + 5-min wait timer)
    environment: ${{ needs.detect-changes.outputs.is_automation == 'true' && 'prod-deploy-auto' || 'prod-deploy' }}
    concurrency:
      group: tf-apply-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Sync live pipeline state from Datadog
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY_PROD }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_PROD }}
        run: |
          python3 scripts/sync_live_state.py \
            --env prod \
            --pipeline-ids ${{ secrets.DD_PIPELINE_IDS_PROD }} \
            --out-dir terraform/environments/prod
          echo "=== Live sync complete (prod) ==="
          cat terraform/environments/prod/drift_report.txt

      - name: Terraform Init
        working-directory: terraform/environments/prod
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform init

      - name: Terraform Plan (final confirmation before apply)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_PROD }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_PROD }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: |
          echo "=== Final plan before prod apply (branch: ${{ gitea.ref_name }}) ==="
          terraform plan -no-color

      - name: Terraform Apply — Production
        working-directory: terraform/environments/prod
        env:
          TF_VAR_datadog_api_key: ${{ secrets.DD_API_KEY_PROD }}
          TF_VAR_datadog_app_key: ${{ secrets.DD_APP_KEY_PROD }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.TF_STATE_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.TF_STATE_SECRET_KEY }}
        run: terraform apply -auto-approve -no-color

      - name: Prod apply succeeded
        if: success()
        run: |
          echo "✅ Production Observability Pipeline processors updated successfully"
          echo "Branch: ${{ gitea.ref_name }}"
          echo "Commit: ${{ gitea.sha }}"
          echo "Actor:  ${{ gitea.actor }}"

      - name: Prod apply failed — alert
        if: failure()
        run: |
          echo "::error::PRODUCTION APPLY FAILED"
          echo "Branch: ${{ gitea.ref_name }} | Commit: ${{ gitea.sha }}"
          exit 1
